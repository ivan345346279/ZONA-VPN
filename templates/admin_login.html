<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Вход в админ-панель</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#6C63FF;--accent:#00D4FF;--bg:#0A0B0F;--surface:#12141A;--border:rgba(255,255,255,0.08);--text:#F0F2FF;--muted:#8B90A0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(108,99,255,.15),transparent 70%)}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:2.5rem;width:min(400px,95vw)
}
.logo{
  display:flex;align-items:center;justify-content:center;gap:.75rem;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:1.2rem;margin-bottom:2rem
}
.logo-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:1.2rem
}
.title{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.4rem;text-align:center}
.sub{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:2rem}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
label{font-size:.8rem;color:var(--muted);font-weight:600}
input{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;padding:.8rem 1rem;color:var(--text);font-size:.95rem;
  font-family:inherit;outline:none;transition:border-color .2s
}
input:focus{border-color:var(--primary)}
.submit{
  width:100%;padding:.9rem;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-weight:700;font-size:.95rem;border:none;cursor:pointer;
  transition:opacity .2s,transform .2s;margin-top:.5rem
}
.submit:hover{opacity:.85;transform:translateY(-1px)}
.error{
  padding:.65rem 1rem;border-radius:10px;margin-bottom:1rem;font-size:.85rem;
  background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#FF4757
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    Админ-панель
  </div>
  <div class="title">Вход</div>
  <div class="sub">Введите пароль для доступа к управлению</div>

  {% with messages = get_flashed_messages() %}
  {% if messages %}{% for m in messages %}<div class="error">⚠️ {{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}

  <form method="POST">
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••" autofocus required/>
    </div>
    <button type="submit" class="submit">Войти →</button>
  </form>
</div>
</body>
</html>
